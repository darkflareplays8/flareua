name: Build FlareUA IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project FlareUA.xcodeproj \
            -scheme FlareUA \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION=${{ env.VERSION }} \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            build

          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/FlareUA.app Payload/
          zip -r flareua-${{ env.VERSION }}.ipa Payload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: FlareUA v${{ env.VERSION }}
          files: flareua-${{ env.VERSION }}.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
