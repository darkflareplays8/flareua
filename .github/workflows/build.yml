name: Build FlareUA IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project FlareUA.xcodeproj \
            -scheme FlareUA \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/FlareUA.app Payload/
          zip -r FlareUA.ipa Payload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: FlareUA v1.0.${{ github.run_number }}
          files: FlareUA.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}