name: Build FlareUA IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project FlareUA.xcodeproj \
            -scheme FlareUA \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/FlareUA.app Payload/
          zip -r FlareUA.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: FlareUA-${{ github.run_number }}.ipa
          path: FlareUA.ipa