name: Build FlareUA IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Create Xcode project structure
        run: |
          mkdir -p FlareUA/FlareUA.xcodeproj
          mkdir -p FlareUA/Sources

          cp ios/FlareUAApp.swift FlareUA/Sources/

          cat > FlareUA/FlareUA.xcodeproj/project.pbxproj << 'PBXEOF'
          // !$*UTF8*$!
          {
            archiveVersion = 1;
            classes = {};
            objectVersion = 56;
            objects = {
              AABBCC000000000000000001 = {isa = PBXBuildFile; fileRef = AABBCC000000000000000011; };
              AABBCC000000000000000011 = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; name = FlareUAApp.swift; path = Sources/FlareUAApp.swift; sourceTree = "<group>"; };
              AABBCC000000000000000021 = {isa = PBXGroup; children = (AABBCC000000000000000011,); name = FlareUA; sourceTree = "<group>"; };
              AABBCC000000000000000031 = {isa = PBXGroup; children = (AABBCC000000000000000021,); sourceTree = "<group>"; };
              AABBCC000000000000000041 = {isa = PBXSourcesBuildPhase; buildActionMask = 2147483647; files = (AABBCC000000000000000001,); runOnlyForDeploymentPostprocessing = 0; };
              AABBCC000000000000000051 = {isa = PBXNativeTarget; buildConfigurationList = AABBCC000000000000000071; buildPhases = (AABBCC000000000000000041,); name = FlareUA; productName = FlareUA; productType = "com.apple.product-type.application"; };
              AABBCC000000000000000061 = {isa = PBXProject; buildConfigurationList = AABBCC000000000000000081; mainGroup = AABBCC000000000000000031; targets = (AABBCC000000000000000051,); };
              AABBCC000000000000000071 = {isa = XCConfigurationList; buildConfigurations = (AABBCC000000000000000091,); defaultConfigurationName = Release; };
              AABBCC000000000000000081 = {isa = XCConfigurationList; buildConfigurations = (AABBCC0000000000000000A1,); defaultConfigurationName = Release; };
              AABBCC000000000000000091 = {
                isa = XCBuildConfiguration;
                buildSettings = {
                  BUNDLE_IDENTIFIER = "com.flareua.app";
                  CURRENT_PROJECT_VERSION = "1.0.${{ github.run_number }}";
                  INFOPLIST_KEY_UIApplicationSceneManifest_Generation = YES;
                  INFOPLIST_KEY_UILaunchScreen_Generation = YES;
                  IPHONEOS_DEPLOYMENT_TARGET = 16.0;
                  MARKETING_VERSION = "1.0.${{ github.run_number }}";
                  PRODUCT_NAME = FlareUA;
                  SDKROOT = iphoneos;
                  SWIFT_VERSION = 5.0;
                  CODE_SIGN_IDENTITY = "";
                  CODE_SIGNING_REQUIRED = NO;
                  CODE_SIGNING_ALLOWED = NO;
                };
                name = Release;
              };
              AABBCC0000000000000000A1 = {isa = XCBuildConfiguration; buildSettings = {}; name = Release; };
            };
            rootObject = AABBCC000000000000000061;
          }
          PBXEOF

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -project FlareUA/FlareUA.xcodeproj \
            -scheme FlareUA \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/FlareUA.app Payload/
          zip -r FlareUA.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlareUA-${{ github.run_number }}.ipa
          path: FlareUA.ipa
